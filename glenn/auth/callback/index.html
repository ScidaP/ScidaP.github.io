<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glenn confirmation</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #14213d;
        background: #f6f8fb;
      }

      main {
        width: min(100%, 560px);
        padding: 40px 32px;
        border: 1px solid #dbe3ee;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 18px 48px rgba(20, 33, 61, 0.08);
        text-align: center;
      }

      img {
        width: 180px;
        height: 180px;
        margin-bottom: 20px;
        border-radius: 50%;
        object-fit: cover;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 2rem;
        line-height: 1.15;
      }

      p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.7;
        color: #4a5568;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="https://scidap.github.io/glenn/icon-logo.png" alt="Glenn logo" />
      <h1>Your email was confirmed successfully.</h1>
      <p>Thanks for using Glenn. You can now sign in.</p>
    </main>
  </body>
</html>
